name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  go:
    name: Go Standard Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # Force module downloads through Takumi Guard on every CI run so newly
          # blocked existing dependencies are not hidden by the GitHub Actions cache.
          cache: false

      - name: Set up Takumi Guard
        uses: flatt-security/setup-takumi-guard-golang@v1

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Vulnerability check
        run: go tool govulncheck ./...

      - name: Check formatting
        run: |
          files="$(gofmt -l ./cmd ./internal)"
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -shuffle=on -coverprofile=coverage.out ./...

      - name: Race test
        run: go test -race -shuffle=on ./...
